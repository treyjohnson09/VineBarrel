    <style>
      .bg { fill:#1F1A17; }
      .vine { font: 220px "Playfair Display", "Georgia", serif; fill:#F5F3F1; }
      .bar { font: 200px "Bitter", "Georgia", serif; fill:#F5F3F1; }
