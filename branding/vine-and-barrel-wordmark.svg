<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" role="img" aria-label="Vine & Barrel wordmark">
  <!-- Wordmark recreation: uses serif for "Vine &" and strong slab for "BARREL". For perfect tracing, convert to outlines in a vector editor. -->
  <defs>
    <style>
      .v-serif { font: 220px "Playfair Display", "Georgia", serif; fill:#1F1A17; letter-spacing:-6px; }
      .amp { font: 200px "Playfair Display", "Georgia", serif; fill:#1F1A17; }
      .b-slab { font: 220px "Bitter", "Georgia", serif; font-weight:700; fill:#1F1A17; letter-spacing:2px; }
    </style>
  </defs>

  <!-- "Vine &" -->
  <text x="30" y="210" class="v-serif">Vine</text>
  <text x="420" y="210" class="amp">&amp;</text>

  <!-- "BARREL" -->
  <text x="40" y="420" class="b-slab">BARREL</text>

  <!-- decorative swash under BARREL (vector mock) -->
  <path d="M120 465 C 320 520, 700 520, 980 470" stroke="#1F1A17" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.95"/>
</svg>